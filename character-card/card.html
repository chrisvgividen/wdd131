<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card Week 8</title>
    <link href = "card.css" rel = "stylesheet">
    <script src = "card.js" defer></script>
</head>
<body>
    <section class = "card">

        <img class = "image" src = "snortleblat.webp" alt = "Picture of Snortleblat">

        <div class = "name">Snortleblat</div>

        <div class = "stats">
            <p><strong>Class: </strong>Swamp Beast Diplomat</p>
            <p><strong>Level: </strong>5</p>
            <p><strong>Health: </strong>100</p>
        </div>

        <div class = "buttons">
            <button id = "attacked">Attacked</button>
            <button id = "level">Level Up</button>
        </div>

    </section>
</body>
</html>
